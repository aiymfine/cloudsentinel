apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cloud-sentinel
  labels:
    app: frontend
    app.kubernetes.io/name: cloud-sentinel
    app.kubernetes.io/component: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: cloud-sentinel
        app.kubernetes.io/component: ui
    spec:
      serviceAccountName: cloud-sentinel-app
      containers:
        - name: frontend
          image: cloud-sentinel-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cloud-sentinel
  labels:
    app: frontend
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      name: http
  selector:
    app: frontend
