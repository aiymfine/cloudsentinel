apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloud-sentinel-app
  namespace: cloud-sentinel
  labels:
    app.kubernetes.io/name: cloud-sentinel
automountServiceAccountToken: false
---
# Minimal role - only what the app needs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloud-sentinel-role
  namespace: cloud-sentinel
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["cloud-sentinel-config"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["cloud-sentinel-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloud-sentinel-binding
  namespace: cloud-sentinel
subjects:
  - kind: ServiceAccount
    name: cloud-sentinel-app
    namespace: cloud-sentinel
roleRef:
  kind: Role
  name: cloud-sentinel-role
  apiGroup: rbac.authorization.k8s.io
